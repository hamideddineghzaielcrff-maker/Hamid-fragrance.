<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil | Hamid Fragrance</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .cv-card {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid #d4af37;
        }
        .cv-card h1 { margin-bottom: 5px; color: #111; }
        .cv-card p { color: #d4af37; font-weight: bold; margin-bottom: 20px; }
        .info-list { text-align: left; background: #f9f9f9; padding: 15px; border-radius: 10px; }
        .info-list div { margin-bottom: 10px; font-size: 14px; }
        .back-btn { 
            display: inline-block; margin-top: 20px; text-decoration: none; 
            color: #111; font-weight: bold; border-bottom: 2px solid #d4af37;
        }
    </style>
</head>
<body>

    <div class="cv-card">
        <h1>HAMID EDDINE GHZAIEL</h1>
        <p>Étudiant en 3ème Informatique</p>

        <div class="info-list">
            <div><strong>📍 Ville :</strong> Houmt Souk, Djerba</div>
            <div><strong>🎓 Classe :</strong> 3ème info 2 (Groupe 1)</div>
            <div><strong>💻 Spécialité :</strong> Technologie de l'Information</div>
            <div><strong>🚀 Projet :</strong> Développement d'une base de données de 600 parfums avec filtrage dynamique.</div>
        </div>

        <a href="index.html" class="back-btn">Retour à l'accueil</a>
    </div>

</body>
</html>
