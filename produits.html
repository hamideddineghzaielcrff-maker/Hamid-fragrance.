<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue | Hamid Fragrance</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .sub-nav { display: flex; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; }
        .sub-nav a { color: #d4af37; text-decoration: none; font-size: 0.8rem; letter-spacing: 1px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; text-align: center; border-radius: 4px; transition: 0.3s; position: relative; }
        .card:hover { border-color: #d4af37; }
        
        .price { display: block; color: #d4af37; margin: 10px 0; font-weight: bold; }
        .stock-tag { font-size: 10px; color: #555; margin-bottom: 15px; }
        
        .btn-buy { 
            width: 100%; background: none; border: 1px solid #d4af37; color: #d4af37; 
            padding: 10px; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px;
        }
        .btn-buy:hover:not([disabled]) { background: #d4af37; color: #000; }
        .btn-buy[disabled] { border-color: #333; color: #333; cursor: not-allowed; }

        /* Notification Luxe (Toast) */
        #toast {
            position: fixed; top: 20px; right: 20px; background: #0a0a0a; color: #d4af37;
            border: 1px solid #d4af37; padding: 15px 25px; border-radius: 4px;
            font-size: 0.8rem; z-index: 1000; display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="toast">Produit ajouté !</div>

    <div class="sub-nav">
        <a href="index.html">← ACCUEIL</a>
        <a href="panier.html">MON PANIER 🛒</a>
    </div>

    <div class="grid" id="fullContainer"></div>

    <script src="database.js"></script>
    <script>
        // Initialisation du stock
        let stocks = JSON.parse(localStorage.getItem('stocks_parfums')) || {};
        if (Object.keys(stocks).length === 0) {
            database.forEach(p => { stocks[p.name] = 100; });
            localStorage.setItem('stocks_parfums', JSON.stringify(stocks));
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }

        function ajouterAuPanier(nom, prix) {
            if (stocks[nom] <= 0) {
                showToast("❌ Rupture de stock");
                return;
            }
            let panier = JSON.parse(localStorage.getItem('panier')) || [];
            panier.push({ name: nom, price: prix });
            localStorage.setItem('panier', JSON.stringify(panier));
            showToast(nom + " ajouté au panier ✨");
        }

        const container = document.getElementById('fullContainer');
        database.forEach(p => {
            let s = stocks[p.name] || 0;
            let dispo = s > 0;
            container.innerHTML += `
                <div class="card" style="${dispo ? '' : 'opacity: 0.5;'}">
                    <div style="font-size:0.6rem; color:#d4af37; text-transform:uppercase;">${p.brand}</div>
                    <h3 style="font-size:0.9rem; font-weight:300;">${p.name}</h3>
                    <span class="price">${p.price} TND</span>
                    <div class="stock-tag">Stock: ${s}</div>
                    <button class="btn-buy" ${dispo ? '' : 'disabled'} 
                        onclick="ajouterAuPanier('${p.name.replace(/'/g, "\\'")}', '${p.price}')">
                        ${dispo ? 'ACHETER' : 'ÉPUISÉ'}
                    </button>
                </div>`;
        });
    </script>
</body>
</html>
